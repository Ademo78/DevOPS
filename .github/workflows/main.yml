name: CI devops 2025
on:
  # Lancement du job lors d'un push sur main et develop
  push:
    branches: 
      - main
      - develop
  # Lancement lors d'une pull request vers n'importe quelle branche
  pull_request:

jobs:
  # Job 1 : Test du backend et analyse de qualité SonarCloud
  test-backend: 
    runs-on: ubuntu-24.04
    steps:
      # Récupération du code source
      - uses: actions/checkout@v4

      # Configuration du JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Build, exécution des tests et analyse SonarCloud
      - name: Build and test with Maven
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=Ademo78_DevOPS \
            -Dsonar.organization=ademo-devops \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -f simple-api/pom.xml

  # Job 2 : Build et Push des images Docker
  build-and-push-docker-image:
    # Ce job ne démarre que si test-backend a réussi
    needs: test-backend 
    runs-on: ubuntu-24.04
    # On ne publie les images que si on est sur la branche main
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Connexion au Docker Hub (Secrets configurés sur GitHub)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build et Push du Backend (API)
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: true

      # Build et Push de la Database (Postgres)
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: true

      # Build et Push du serveur HTTP (Apache/HTTPD)
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: true
