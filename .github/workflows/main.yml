name: CI devops 2025
on:
  # Lancement du job lors d'un push sur main et develop
  push:
    branches: 
      - main
      - develop
  # Lancement lors d'une pull request vers n'importe quelle branche
  pull_request:

jobs:
  test-backend: 
    runs-on: ubuntu-24.04
    steps:
      # Récupération du code source
      - uses: actions/checkout@v4

      # Configuration du JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # Distribution recommandée (Eclipse Temurin)

      # Build et exécution des tests avec Maven
      - name: Build and test with Maven
        # On utilise le répertoire où se trouve le pom.xml (souvent simple-api)
        # Si le pom.xml est à la racine, retire la partie "-f simple-api/pom.xml"
        run: mvn clean verify
