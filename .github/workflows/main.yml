name: CI devops 2025

on:
  push:
    branches: 
      - main
      - develop
  pull_request:

jobs:
  # Job 1 : Test et Qualité (SonarCloud)
  test-backend: 
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test with Maven and SonarCloud
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=Ademo78_DevOPS \
            -Dsonar.organization=ademo78 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -f simple-api/pom.xml

  # Job 2 : Build et Push (Docker Hub)
  build-and-push-docker-image:
    needs: test-backend 
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        run: |
          # Utilisation de docker-build-push pour simplifier ou répétition de ton bloc original
          docker build ./simple-api --tag ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest --push
          docker build ./database --tag ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest --push
          docker build ./http-server --tag ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest --push

  # Job 3 : Déploiement automatique (CD)
  deploy:
    needs: build-and-push-docker-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > id_rsa
          chmod 600 id_rsa
          mkdir -p ~/.ssh
          ssh-keyscan -H adam.ben-hamida.takima.school >> ~/.ssh/known_hosts

      - name: Create inventory file
        # On injecte l'inventaire via un secret pour plus de sécurité
        run: echo "${{ secrets.ANSIBLE_INVENTORY }}" > inventory.yml

      - name: Run Ansible Playbook
        run: |
          pip install ansible
          ansible-playbook -i inventory.yml ansible/playbook.yml